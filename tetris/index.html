<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Скрипа Рядом - Cosmic Tetris v3.0</title>
    <style>
        body {
            background: #0b0c10;
            color: #66fcf1;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            gap: 30px;
            padding: 25px;
            background: rgba(31, 40, 51, 0.7);
            border-radius: 20px;
            border: 1px solid #45a29e;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        /* ИГРОВОЕ ПОЛЕ */
        .game-side {
            position: relative;
            border: 4px solid #45a29e;
            background: #000;
            line-height: 0;
        }

        canvas#tetris {
            width: 300px;
            height: 600px;
            display: block;
        }

        /* ЭКРАН ПАУЗЫ */
        #pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; /* Скрыто по умолчанию */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #pause-overlay h2 { color: #66fcf1; text-shadow: 0 0 10px #66fcf1; font-size: 2rem; }

        /* ИНФО-ПАНЕЛЬ */
        .info-side {
            display: flex;
            flex-direction: column;
            width: 240px;
            justify-content: flex-start;
            gap: 20px;
        }

        .brand-section {
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #45a29e;
            border: 1px solid #45a29e;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .back-btn:hover { color: #66fcf1; border-color: #66fcf1; box-shadow: 0 0 10px #66fcf1; }

        .logo-svg { width: 50px; height: 50px; filter: drop-shadow(0 0 8px #66fcf1); }
        .brand-title { font-size: 1.2rem; font-weight: bold; margin: 5px 0; color: #fff; letter-spacing: 2px; }

        .next-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid #45a29e;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        canvas#next { width: 80px; height: 80px; }

        .label { color: #45a29e; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; display: block;}
        .value { font-size: 1.4rem; font-weight: bold; color: #fff; }

        /* УПРАВЛЕНИЕ И ПОДСКАЗКИ */
        .controls-hint {
            background: rgba(69, 162, 158, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(69, 162, 158, 0.3);
        }

        .key-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .key {
            width: 32px; height: 32px;
            border: 1px solid #66fcf1;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: #66fcf1;
            background: rgba(0,0,0,0.3);
        }

        .hint-list {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
            font-size: 11px;
            color: #c5c6c7;
            line-height: 1.6;
        }
        .hint-list span { color: #66fcf1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="game-side">
            <canvas id="tetris" width="240" height="480"></canvas>
            <div id="pause-overlay">
                <h2>ПАУЗА</h2>
                <p style="font-size: 0.8rem;">Нажми ESC или P для продолжения</p>
            </div>
        </div>

        <div class="info-side">
            <div class="brand-section">
                <a href="../index.html" class="back-btn">← в меню</a><br>
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M25 65Q25 35 50 35M75 65Q75 35 50 35" stroke="#66fcf1" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="50" cy="40" r="4" fill="#66fcf1"></circle>
                    <path d="M35 75L50 55L65 75" stroke="#45a29e" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <div class="brand-title">СКРИПА РЯДОМ</div>
            </div>

            <div class="next-box">
                <span class="label">СЛЕДУЮЩАЯ</span>
                <canvas id="next" width="80" height="80"></canvas>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="next-box" style="flex: 1;">
                    <span class="label">СЧЕТ</span>
                    <div id="score" class="value">0</div>
                </div>
            </div>

            <div class="controls-hint">
                <span class="label" style="text-align: center; margin-bottom: 10px;">УПРАВЛЕНИЕ</span>
                <div class="key-row">
                    <div class="key">▲</div>
                </div>
                <div class="key-row">
                    <div class="key">◀</div>
                    <div class="key">▼</div>
                    <div class="key">▶</div>
                </div>
                <ul class="hint-list">
                    <li><span>▲</span> — Поворот фигуры</li>
                    <li><span>▼</span> — Ускорить падение</li>
                    <li><span>◀ ▶</span> — Движение влево/вправо</li>
                    <li><span>P / ESC</span> — <b>Пауза</b></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const pauseOverlay = document.getElementById('pause-overlay');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        const colors = [null, '#ff1744', '#00e5ff', '#00e676', '#d500f9', '#ff9100', '#ffea00', '#2979ff'];

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);

            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (player.next) drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function arenaSweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += 10;
            }
            document.getElementById('score').innerText = player.score;
        }

        function playerDrop() {
            if (paused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (paused) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerRotate(dir) {
            if (paused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                document.getElementById('score').innerText = 0;
            }
        }

        let paused = false;
        function togglePause() {
            paused = !paused;
            pauseOverlay.style.display = paused ? 'flex' : 'none';
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            if (!paused) {
                const deltaTime = time - lastTime;
                lastTime = time;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
                draw();
            } else {
                lastTime = time; // Чтобы при выходе из паузы не было прыжка
            }
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 24);
        const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);        // Лево
            else if (event.keyCode === 39) playerMove(1);   // Право
            else if (event.keyCode === 40) playerDrop();    // Вниз
            else if (event.keyCode === 38) playerRotate(1); // Вверх (Поворот)
            else if (event.keyCode === 80 || event.keyCode === 27) togglePause(); // P или ESC
        });

        playerReset();
        update();
    </script>
</body>
</html>
