<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СКРИПА РЯДОМ: CHESS NEON</title>
    <style>
        :root { 
            --neon: #66fcf1; 
            --dark-bg: #0b0c10; 
            --cell-white: #1f2833; 
            --cell-black: #0b0c10; 
            --accent: #45a29e;
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--dark-bg); 
            color: var(--neon); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
            touch-action: manipulation;
        }

        /* MATRIX BACKGROUND */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            filter: blur(1px);
        }

        /* ШАПКА ДЛЯ ПК */
        .scripa-header-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .main-logo-img {
            width: 240px; 
            height: auto;
            display: block;
            filter: drop-shadow(0 0 15px rgba(102, 252, 241, 0.4));
        }

        .header-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            z-index: 1;
        }
        
        .back-btn {
            text-decoration: none; color: var(--accent); border: 1px solid var(--accent);
            padding: 4px 12px; border-radius: 20px; font-size: 10px; text-transform: uppercase;
        }

        .game-title {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--neon);
            margin: 0;
        }

        .game-info { display: flex; gap: 20px; align-items: center; margin-bottom: 10px; z-index: 1; }
        .status { font-weight: bold; color: #fff; text-transform: uppercase; font-size: 0.9rem; }

        /* ДОСКА */
        .board { 
            display: grid; 
            grid-template-columns: repeat(8, 55px); 
            grid-template-rows: repeat(8, 55px); 
            border: 4px solid var(--accent); 
            z-index: 1;
        }

        .cell { 
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; 
            font-size: 35px; cursor: pointer; position: relative; user-select: none;
        }
        .cell.white { background: var(--cell-white); }
        .cell.black { background: var(--cell-black); }
        .white-piece { color: #fff; }
        .black-piece { color: var(--neon); }
        .selected { background: rgba(102, 252, 241, 0.3) !important; }
        .valid-dot::after {
            content: ""; width: 12px; height: 12px; background: rgba(102, 252, 241, 0.4); 
            border-radius: 50%; position: absolute;
        }

        .controls { margin-top: 20px; display: flex; gap: 10px; z-index: 1; }
        button {
            background: transparent; color: var(--neon); border: 1px solid var(--neon);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; text-transform: uppercase;
        }
        button.active { background: var(--neon); color: #000; }

        /* МОБИЛЬНАЯ АДАПТИВНОСТЬ */
        @media (max-width: 650px) {
            .scripa-header-fixed { display: none !important; } /* ЛОГОТИП УДАЛЕН */
            .header-content { margin-top: 0; }
            .game-title { font-size: 1.5rem; }
            .board { 
                grid-template-columns: repeat(8, 11.8vw); 
                grid-template-rows: repeat(8, 11.8vw); 
            }
            .cell { font-size: 26px; }
            .game-info { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="scripa-header-fixed">
    <a href="../index.html">
        <img src="../assets/logo_games.png" alt="SCRIPA GAMES" class="main-logo-img">
    </a>
</div>

<div class="header-content">
    <a href="../index.html" class="back-btn">← в меню</a>
    <h1 class="game-title">CHESS NEON</h1>
</div>

<div class="game-info">
    <div id="mode-display" style="color: var(--accent); font-size: 0.8rem;">ИИ: АКТИВЕН</div>
    <div class="status" id="status">ВАШ ХОД</div>
</div>

<div id="board" class="board"></div>

<div class="controls">
    <button id="btnAI" class="active" onclick="setMode('AI')">Против ИИ</button>
    <button id="btnPvP" onclick="setMode('PvP')">На двоих</button>
    <button onclick="initGame()">Сброс</button>
</div>

<script>
    // MATRIX BG
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    const drops = Array(Math.floor(w / 20)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(11, 12, 16, 0.1)';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#66fcf1';
        ctx.font = '15px monospace';
        drops.forEach((y, i) => {
            const text = Math.floor(Math.random() * 10);
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > h && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }

    // GAME ENGINE
    const icons = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
    const pieceWeights = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900 };
    let board = [], turn = 'W', selected = null, mode = 'AI', gameOver = false;

    function initGame() {
        board = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];
        turn = 'W'; selected = null; gameOver = false;
        document.getElementById('status').innerText = "ВАШ ХОД (БЕЛЫЕ)";
        render();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnAI').className = m === 'AI' ? 'active' : '';
        document.getElementById('btnPvP').className = m === 'PvP' ? 'active' : '';
        initGame();
    }

    function render() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        const validMoves = selected ? getValidMoves(selected.r, selected.c) : [];

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                const p = board[r][c];
                if (p) {
                    cell.innerText = icons[p];
                    cell.classList.add(p === p.toUpperCase() ? 'white-piece' : 'black-piece');
                }
                if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');
                if (validMoves.some(m => m.r === r && m.c === c)) cell.classList.add('valid-dot');
                cell.onclick = () => handleClick(r, c);
                boardDiv.appendChild(cell);
            }
        }
    }

    function handleClick(r, c) {
        if (gameOver) return;
        const p = board[r][c];
        const isMyPiece = p && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase());

        if (selected) {
            const moves = getValidMoves(selected.r, selected.c);
            const move = moves.find(m => m.r === r && m.c === c);
            if (move) {
                makeMove(selected.r, selected.c, r, c);
                selected = null;
                render();
                if (!gameOver && mode === 'AI' && turn === 'B') setTimeout(aiMove, 500);
                return;
            }
        }
        if (isMyPiece) { selected = {r, c}; render(); }
        else { selected = null; render(); }
    }

    function makeMove(fR, fC, tR, tC) {
        board[tR][tC] = board[fR][fC];
        board[fR][fC] = '';
        if (board[tR][tC] === 'P' && tR === 0) board[tR][tC] = 'Q';
        if (board[tR][tC] === 'p' && tR === 7) board[tR][tC] = 'q';
        turn = turn === 'W' ? 'B' : 'W';
        document.getElementById('status').innerText = turn === 'W' ? "ХОД БЕЛЫХ" : "ХОД ЧЕРНЫХ";
        checkEndGame();
    }

    function getValidMoves(fR, fC) {
        const moves = [];
        for (let tR = 0; tR < 8; tR++) {
            for (let tC = 0; tC < 8; tC++) {
                if (canMove(fR, fC, tR, tC)) {
                    const oldTo = board[tR][tC], oldFrom = board[fR][fC];
                    board[tR][tC] = oldFrom; board[fR][fC] = '';
                    if (!isCheck(oldFrom === oldFrom.toUpperCase() ? 'W' : 'B')) moves.push({r: tR, c: tC});
                    board[fR][fC] = oldFrom; board[tR][tC] = oldTo;
                }
            }
        }
        return moves;
    }

    function canMove(fR, fC, tR, tC) {
        if (fR === tR && fC === tC) return false;
        const p = board[fR][fC].toLowerCase(), isW = board[fR][fC] === board[fR][fC].toUpperCase();
        const target = board[tR][tC];
        if (target !== '' && (target === target.toUpperCase()) === isW) return false;

        const dr = Math.abs(tR - fR), dc = Math.abs(tC - fC);
        const sR = tR > fR ? 1 : tR < fR ? -1 : 0, sC = tC > fC ? 1 : tC < fC ? -1 : 0;

        if (p === 'p') {
            const dir = isW ? -1 : 1;
            if (fC === tC && target === '') {
                if (tR - fR === dir) return true;
                if (tR - fR === 2 * dir && fR === (isW?6:1) && board[fR+dir][fC]==='') return true;
            }
            return (dr === 1 && dc === 1 && target !== '');
        }
        if (p === 'n') return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
        if (p === 'k') return dr <= 1 && dc <= 1;
        if (p === 'r' || p === 'b' || p === 'q') {
            if (p === 'r' && fR !== tR && fC !== tC) return false;
            if (p === 'b' && dr !== dc) return false;
            if (p === 'q' && dr !== dc && fR !== tR && fC !== tC) return false;
            let cR = fR + sR, cC = fC + sC;
            while (cR !== tR || cC !== tC) { if (board[cR][cC] !== '') return false; cR += sR; cC += sC; }
            return true;
        }
        return false;
    }

    function isCheck(color) {
        let kR, kC, king = color === 'W' ? 'K' : 'k';
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(board[r][c] === king) { kR=r; kC=c; }
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            const p = board[r][c];
            if (p && (color === 'W' ? p === p.toLowerCase() : p === p.toUpperCase())) {
                if (canMove(r, c, kR, kC)) return true;
            }
        }
        return false;
    }

    function checkEndGame() {
        let moves = false;
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            const p = board[r][c];
            if (p && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase())) {
                if (getValidMoves(r, c).length > 0) moves = true;
            }
        }
        if (!moves) {
            gameOver = true;
            document.getElementById('status').innerText = isCheck(turn) ? "МАТ!" : "ПАТ!";
        }
    }

    function aiMove() {
        let moves = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            if(board[r][c] && board[r][c] === board[r][c].toLowerCase()) {
                getValidMoves(r, c).forEach(m => {
                    let s = board[m.r][m.c] ? pieceWeights[board[m.r][m.c].toLowerCase()] : 0;
                    moves.push({fR:r, fC:c, tR:m.r, tC:m.c, s});
                });
            }
        }
        if (moves.length) {
            moves.sort((a,b) => b.s - a.s);
            const best = moves.filter(x => x.s === moves[0].s);
            const m = best[Math.floor(Math.random()*best.length)];
            makeMove(m.fR, m.fC, m.tR, m.tC);
            render();
        }
    }

    function animate() { drawMatrix(); requestAnimationFrame(animate); }
    window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; render(); };
    
    initGame();
    animate();
</script>
</body>
</html>
