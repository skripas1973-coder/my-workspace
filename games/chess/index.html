<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СКРИПА РЯДОМ: CHESS PRO v3.5</title>
    <style>
        :root { 
            --neon: #66fcf1; 
            --dark-bg: #0b0c10; 
            --cell-white: #1f2833; 
            --cell-black: #0b0c10; 
            --accent: #45a29e;
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--dark-bg); 
            color: var(--neon); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            touch-action: manipulation;
        }

        /* MATRIX BACKGROUND */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            filter: blur(1px);
        }

        /* УНИВЕРСАЛЬНАЯ ШАПКА SCRIPA */
        .scripa-header-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .main-logo-img {
            width: 240px; 
            height: auto;
            display: block;
            filter: drop-shadow(0 0 15px rgba(102, 252, 241, 0.4));
            transition: 0.3s;
            image-rendering: -webkit-optimize-contrast;
        }
        .main-logo-img:hover { filter: drop-shadow(0 0 25px var(--neon)); opacity: 0.9; }

        .header-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            z-index: 1;
        }
        
        .back-btn {
            text-decoration: none; color: var(--accent); border: 1px solid var(--accent);
            padding: 4px 12px; border-radius: 20px; font-size: 10px; text-transform: uppercase; transition: 0.3s;
            background: transparent;
        }
        .back-btn:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .game-title {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
            margin: 0;
        }

        .game-info { display: flex; gap: 20px; align-items: center; margin-bottom: 10px; z-index: 1; }
        .status { font-weight: bold; letter-spacing: 1px; color: #fff; text-transform: uppercase; font-size: 0.9rem; min-height: 20px; }

        /* ШАХМАТНАЯ ДОСКА */
        .board { 
            display: grid; 
            grid-template-columns: repeat(8, 50px); 
            grid-template-rows: repeat(8, 50px); 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            z-index: 1;
        }

        .cell { 
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; cursor: pointer; position: relative; user-select: none; transition: 0.2s;
        }
        .cell.white { background: var(--cell-white); }
        .cell.black { background: var(--cell-black); }

        .white-piece { color: #fff; filter: drop-shadow(0 0 2px #000); }
        .black-piece { color: var(--neon); filter: drop-shadow(0 0 2px #000); }

        .selected { background: rgba(102, 252, 241, 0.35) !important; }
        
        .valid-dot::after {
            content: ""; width: 10px; height: 10px; background: rgba(102, 252, 241, 0.5); 
            border-radius: 50%; position: absolute;
        }

        .controls { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; z-index: 1; }
        button {
            background: transparent; color: var(--neon); border: 1px solid var(--neon);
            padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 10px; 
            text-transform: uppercase; transition: 0.3s; font-family: inherit; outline: none;
        }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        button.active { background: var(--neon); color: #000; }

        @media (max-width: 600px) {
            .scripa-header-fixed { display: none; } /* Убираем логотип */
            .header-content { margin-top: -20px; } /* Поднимаем контент */
            .game-title { font-size: 1.4rem; }
            .board { grid-template-columns: repeat(8, 11.5vw); grid-template-rows: repeat(8, 11.5vw); }
            .cell { font-size: 24px; }
            .game-info { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="scripa-header-fixed">
    <a href="../index.html">
        <img src="../assets/logo_games.png" alt="SCRIPA GAMES" class="main-logo-img">
    </a>
</div>

<div class="header-content">
    <a href="../index.html" class="back-btn">← в меню</a>
    <h1 class="game-title">НЕОНОВЫЕ ШАХМАТЫ</h1>
</div>

<div class="game-info">
    <div id="mode-display" style="color: var(--accent); font-size: 0.8rem;">РЕЖИМ: ПРОТИВ ИИ</div>
    <div class="status" id="status">ВАШ ХОД (БЕЛЫЕ)</div>
</div>

<div id="board" class="board"></div>

<div class="controls">
    <button id="btnAI" class="active" onclick="setMode('AI')">Против ИИ</button>
    <button id="btnPvP" onclick="setMode('PvP')">На двоих</button>
    <button onclick="initGame()">Сброс</button>
</div>

<script>
    // MATRIX BACKGROUND LOGIC
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgW = bgCanvas.width = window.innerWidth;
    let bgH = bgCanvas.height = window.innerHeight;
    const drops = Array(Math.floor(bgW / 20)).fill(1);

    function drawBackground() {
        bgCtx.fillStyle = 'rgba(11, 12, 16, 0.1)';
        bgCtx.fillRect(0, 0, bgW, bgH);
        bgCtx.fillStyle = '#66fcf1';
        bgCtx.font = '15px monospace';
        for (let i = 0; i < drops.length; i++) {
            const text = Math.floor(Math.random() * 10);
            bgCtx.fillText(text, i * 20, drops[i] * 20);
            if (drops[i] * 20 > bgH && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    // GAME ENGINE
    const icons = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
    const pieceWeights = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900 };
    let board = [], turn = 'W', selected = null, mode = 'AI', gameOver = false;

    function initGame() {
        board = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];
        turn = 'W'; selected = null; gameOver = false;
        document.getElementById('status').innerText = "ВАШ ХОД (БЕЛЫЕ)";
        render();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btnAI').className = m === 'AI' ? 'active' : '';
        document.getElementById('btnPvP').className = m === 'PvP' ? 'active' : '';
        document.getElementById('mode-display').innerText = `РЕЖИМ: ${m === 'AI' ? 'ПРОТИВ ИИ' : 'НА ДВОИХ'}`;
        initGame();
    }

    function render() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        const possibleMoves = selected ? getValidMoves(selected.r, selected.c) : [];

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                const p = board[r][c];
                if (p) {
                    cell.innerText = icons[p];
                    cell.classList.add(p === p.toUpperCase() ? 'white-piece' : 'black-piece');
                }
                if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');
                if (possibleMoves.some(m => m.r === r && m.c === c)) cell.classList.add('valid-dot');
                
                cell.onclick = () => handleClick(r, c);
                boardDiv.appendChild(cell);
            }
        }
    }

    function handleClick(r, c) {
        if (gameOver) return;
        const p = board[r][c];
        const isMyPiece = p && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase());

        if (selected) {
            const moves = getValidMoves(selected.r, selected.c);
            const move = moves.find(m => m.r === r && m.c === c);
            if (move) {
                makeMove(selected.r, selected.c, r, c);
                selected = null;
                render();
                
                if (!gameOver && mode === 'AI' && turn === 'B') {
                    document.getElementById('status').innerText = "ИИ ДУМАЕТ...";
                    setTimeout(aiMove, 600);
                }
                return;
            }
        }
        if (isMyPiece) { selected = {r, c}; render(); }
        else { selected = null; render(); }
    }

    function makeMove(fR, fC, tR, tC) {
        board[tR][tC] = board[fR][fC];
        board[fR][fC] = '';
        if (board[tR][tC] === 'P' && tR === 0) board[tR][tC] = 'Q';
        if (board[tR][tC] === 'p' && tR === 7) board[tR][tC] = 'q';
        
        turn = turn === 'W' ? 'B' : 'W';
        document.getElementById('status').innerText = turn === 'W' ? "ВАШ ХОД (БЕЛЫЕ)" : "ХОД ЧЕРНЫХ";
        checkEndGame();
    }

    function getValidMoves(fR, fC) {
        const moves = [];
        for (let tR = 0; tR < 8; tR++) {
            for (let tC = 0; tC < 8; tC++) {
                if (canPieceMove(fR, fC, tR, tC)) {
                    const originalTo = board[tR][tC];
                    const originalFrom = board[fR][fC];
                    board[tR][tC] = originalFrom;
                    board[fR][fC] = '';
                    if (!isKingInCheck(originalFrom === originalFrom.toUpperCase() ? 'W' : 'B')) {
                        moves.push({r: tR, c: tC});
                    }
                    board[fR][fC] = originalFrom;
                    board[tR][tC] = originalTo;
                }
            }
        }
        return moves;
    }

    function canPieceMove(fR, fC, tR, tC) {
        if (fR === tR && fC === tC) return false;
        const p = board[fR][fC].toLowerCase();
        const isW = board[fR][fC] === board[fR][fC].toUpperCase();
        const target = board[tR][tC];
        if (target !== '' && (target === target.toUpperCase()) === isW) return false;

        const dr = Math.abs(tR - fR), dc = Math.abs(tC - fC);
        const sR = tR > fR ? 1 : tR < fR ? -1 : 0;
        const sC = tC > fC ? 1 : tC < fC ? -1 : 0;

        if (p === 'p') {
            const dir = isW ? -1 : 1;
            if (fC === tC && target === '') {
                if (tR - fR === dir) return true;
                if (tR - fR === 2 * dir && fR === (isW?6:1) && board[fR+dir][fC]==='') return true;
            }
            return (dr === 1 && dc === 1 && target !== '');
        }
        if (p === 'n') return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
        if (p === 'k') return dr <= 1 && dc <= 1;
        if (p === 'r' || p === 'b' || p === 'q') {
            if (p === 'r' && fR !== tR && fC !== tC) return false;
            if (p === 'b' && dr !== dc) return false;
            if (p === 'q' && dr !== dc && fR !== tR && fC !== tC) return false;
            let curR = fR + sR, curC = fC + sC;
            while (curR !== tR || curC !== tC) {
                if (board[curR][curC] !== '') return false;
                curR += sR; curC += sC;
            }
            return true;
        }
        return false;
    }

    function isKingInCheck(color) {
        let kR, kC;
        const king = color === 'W' ? 'K' : 'k';
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(board[r][c] === king) { kR=r; kC=c; }
        if (kR === undefined) return false;
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                const p = board[r][c];
                if (p && (color === 'W' ? p === p.toLowerCase() : p === p.toUpperCase())) {
                    if (canPieceMove(r, c, kR, kC)) return true;
                }
            }
        }
        return false;
    }

    function checkEndGame() {
        let hasMoves = false;
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const p = board[r][c];
                if (p && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase())) {
                    if (getValidMoves(r, c).length > 0) hasMoves = true;
                }
            }
        }
        if (!hasMoves) {
            gameOver = true;
            if (isKingInCheck(turn)) {
                const winner = turn === 'W' ? "ЧЕРНЫЕ" : "БЕЛЫЕ";
                document.getElementById('status').innerText = `МАТ! ПОБЕДА: ${winner}`;
            } else {
                document.getElementById('status').innerText = "НИЧЬЯ (ПАТ)";
            }
        }
    }

    function aiMove() {
        if (gameOver) return;
        let moves = [];
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                if(board[r][c] && board[r][c] === board[r][c].toLowerCase()) {
                    const valid = getValidMoves(r, c);
                    valid.forEach(m => {
                        let score = 0;
                        if (board[m.r][m.c] !== '') {
                            score = pieceWeights[board[m.r][m.c].toLowerCase()] || 10;
                        }
                        moves.push({fR:r, fC:c, tR:m.r, tC:m.c, score});
                    });
                }
            }
        }

        if(moves.length > 0) {
            moves.sort((a,b) => b.score - a.score);
            const bestMoves = moves.filter(m => m.score === moves[0].score);
            const m = bestMoves[Math.floor(Math.random()*bestMoves.length)];
            makeMove(m.fR, m.fC, m.tR, m.tC);
        }
        render();
    }

    function animate() {
        drawBackground();
        requestAnimationFrame(animate);
    }

    window.onresize = () => {
        bgW = bgCanvas.width = window.innerWidth;
        bgH = bgCanvas.height = window.innerHeight;
        render();
    };

    initGame();
    animate();
</script>
</body>
</html>
