<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRIPA: COSMIC TETRIS</title>
    <link rel="apple-touch-icon" href="../assets/logo_games.png">
    <meta name="theme-color" content="#0b0c10">
    <link rel="manifest" href="../manifest.json">
    
    <style>
        :root { 
            --neon: #66fcf1; 
            --dark-bg: #0b0c10; 
            --accent: #45a29e;
            --cell-bg: #1f2833;
        }

        body {
            background: var(--dark-bg);
            color: var(--neon);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: none;
        }

        .scripa-header-fixed {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .main-logo-img {
            width: 240px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 20px rgba(102, 252, 241, 0.5));
            image-rendering: -webkit-optimize-contrast;
        }

        .header-content {
            margin-top: 40px;
            margin-bottom: 20px;
            text-align: center;
        }

        .back-btn {
            text-decoration: none; color: var(--accent); border: 1px solid var(--accent);
            padding: 6px 18px; border-radius: 20px; font-size: 12px; text-transform: uppercase;
            transition: 0.3s; display: inline-block; margin-bottom: 10px;
        }
        .back-btn:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        .game-title {
            font-size: 2.5rem; font-weight: bold; letter-spacing: 6px; text-transform: uppercase;
            color: var(--neon); text-shadow: 0 0 15px rgba(102, 252, 241, 0.6); margin: 0;
        }

        .main-container {
            display: flex;
            gap: 30px;
            padding: 25px;
            background: rgba(31, 40, 51, 0.5);
            border-radius: 20px;
            border: 1px solid var(--accent);
            margin-top: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            margin-bottom: 30px;
        }

        .game-side { position: relative; border: 4px solid var(--accent); background: #000; line-height: 0; }
        canvas#tetris { width: 240px; height: 480px; display: block; }

        /* ЭКРАН ПАУЗЫ */
        #pause-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #pause-overlay h2 { color: var(--neon); letter-spacing: 5px; margin-bottom: 20px; }
        .resume-btn {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 10px 20px; cursor: pointer; text-transform: uppercase;
        }

        .info-side { display: flex; flex-direction: column; width: 200px; gap: 20px; }
        .info-box { background: rgba(0,0,0,0.6); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; text-align: center; }
        canvas#next { width: 80px; height: 80px; }
        .label { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .value { font-size: 1.6rem; font-weight: bold; color: #fff; }

        .controls-hint {
            background: rgba(69, 162, 158, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(69, 162, 158, 0.3);
        }

        .key-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        .key {
            width: 30px; height: 30px;
            border: 1px solid var(--neon);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--neon);
            background: rgba(0,0,0,0.3);
            font-weight: bold;
        }

        .hint-list {
            list-style: none; padding: 0; margin: 10px 0 0 0;
            font-size: 11px; color: #c5c6c7; line-height: 1.8;
            text-align: left;
        }
        .hint-list span { color: var(--neon); font-weight: bold; }

        .mobile-controls { display: none; }

        @media (max-width: 900px) {
            .scripa-header-fixed { display: none; }
            .header-content { margin-top: 15px; }
            .game-title { font-size: 1.5rem; }
            .main-container { flex-direction: column; padding: 10px; border: none; background: transparent; gap: 15px; margin-top: 0; align-items: center; box-shadow: none; }
            .info-side { flex-direction: row; width: 100%; justify-content: center; gap: 10px; }
            .info-box { min-width: 90px; padding: 10px; }
            .controls-hint { display: none; } 
            
            canvas#tetris { width: 60vw; height: 120vw; max-height: 48vh; }
            
            .mobile-controls {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                margin-top: auto;
                padding-bottom: 30px;
            }

            .ctrl-btn {
                width: 65px; height: 65px;
                background: rgba(102, 252, 241, 0.05);
                border: 2px solid var(--neon);
                border-radius: 50%;
                color: var(--neon);
                font-size: 1.8rem;
                display: flex; align-items: center; justify-content: center;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }
            .ctrl-btn:active { background: var(--neon); color: var(--dark-bg); box-shadow: 0 0 30px var(--neon); }
            .btn-up { grid-column: 2; grid-row: 1; }
            .btn-left { grid-column: 1; grid-row: 2; }
            .btn-down { grid-column: 2; grid-row: 2; }
            .btn-right { grid-column: 3; grid-row: 2; }
            .btn-pause { grid-column: 3; grid-row: 1; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="scripa-header-fixed">
        <a href="../index.html">
            <img src="../assets/logo_games.png" alt="SCRIPA GAMES" class="main-logo-img">
        </a>
    </div>

    <div class="header-content">
        <a href="../index.html" class="back-btn">← В МЕНЮ</a>
        <h1 class="game-title">TETRIS</h1>
    </div>

    <div class="main-container">
        <div class="game-side">
            <canvas id="tetris" width="240" height="480"></canvas>
            <div id="pause-overlay">
                <h2>ПАУЗА</h2>
                <button class="resume-btn" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
            </div>
        </div>

        <div class="info-side">
            <div class="info-box">
                <span class="label">NEXT</span>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <div class="info-box">
                <span class="label">SCORE</span>
                <div id="score" class="value">0</div>
            </div>
            
            <div class="controls-hint">
                <span class="label">УПРАВЛЕНИЕ</span>
                <div class="key-row">
                    <div class="key">▲</div>
                </div>
                <div class="key-row">
                    <div class="key">◀</div>
                    <div class="key">▼</div>
                    <div class="key">▶</div>
                </div>
                <ul class="hint-list">
                    <li><span>▲</span> — Поворот</li>
                    <li><span>▼</span> — Ускорить</li>
                    <li><span>◀ ▶</span> — Движение</li>
                    <li><span>P / Esc</span> — Пауза</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="ctrl-btn btn-up" id="btn-up">↻</div>
        <div class="ctrl-btn btn-pause" id="btn-pause">II</div>
        <div class="ctrl-btn btn-left" id="btn-left">◀</div>
        <div class="ctrl-btn btn-down" id="btn-down">▼</div>
        <div class="ctrl-btn btn-right" id="btn-right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const pauseOverlay = document.getElementById('pause-overlay');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        const colors = [null, '#66fcf1', '#45a29e', '#00e676', '#ff1744', '#ff9100', '#ffea00', '#2979ff'];

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);

            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (player.next) drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function arenaSweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += 10;
            }
            document.getElementById('score').innerText = player.score;
        }

        function playerDrop() {
            if (paused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (paused) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerRotate(dir) {
            if (paused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                document.getElementById('score').innerText = 0;
            }
        }

        let paused = false;
        function togglePause() {
            paused = !paused;
            pauseOverlay.style.display = paused ? 'flex' : 'none';
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            if (!paused) {
                const deltaTime = time - lastTime;
                lastTime = time;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
                draw();
            } else {
                lastTime = time;
            }
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 24);
        const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };

        document.addEventListener('keydown', event => {
            if ([32, 37, 38, 39, 40].indexOf(event.keyCode) > -1) event.preventDefault();
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
            else if (event.keyCode === 80 || event.keyCode === 27) togglePause();
        });

        const setupBtn = (id, fn) => {
            const btn = document.getElementById(id);
            if(btn) btn.addEventListener('touchstart', (e) => { e.preventDefault(); fn(); });
        };
        setupBtn('btn-left', () => playerMove(-1));
        setupBtn('btn-right', () => playerMove(1));
        setupBtn('btn-down', () => playerDrop());
        setupBtn('btn-up', () => playerRotate(1));
        setupBtn('btn-pause', () => togglePause());

        playerReset();
        update();
    </script>
</body>
</html>
