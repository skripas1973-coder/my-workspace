<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRIPA: COSMIC TETRIS</title>
    <style>
        :root { 
            --neon: #66fcf1; 
            --dark-bg: #0b0c10; 
            --accent: #45a29e;
            --cell-bg: #1f2833;
        }

        body {
            background: var(--dark-bg);
            color: var(--neon);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: none; /* Отключаем лишние жесты браузера */
        }

        /* ШАПКА */
        .scripa-header-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .logo-link {
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }
        
        .logo-link:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .main-logo-img {
            width: 240px; 
            height: auto;
            display: block;
            filter: drop-shadow(0 0 20px rgba(102, 252, 241, 0.5));
        }

        .header-content {
            margin-top: 80px;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            text-decoration: none; color: var(--accent); border: 1px solid var(--accent);
            padding: 5px 15px; border-radius: 20px; font-size: 11px; text-transform: uppercase; transition: 0.3s;
        }
        .back-btn:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .game-title {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.5);
            margin: 0;
        }

        /* КОНТЕЙНЕР ИГРЫ */
        .main-container {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: rgba(31, 40, 51, 0.4);
            border-radius: 20px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        .game-side {
            position: relative;
            border: 3px solid var(--accent);
            background: #000;
            line-height: 0;
        }

        canvas#tetris {
            width: 200px;
            height: 400px;
            display: block;
        }

        #pause-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .info-side {
            display: flex;
            flex-direction: column;
            width: 120px;
            gap: 15px;
        }

        .info-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        canvas#next { width: 60px; height: 60px; }

        .label { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .value { font-size: 1.2rem; font-weight: bold; color: #fff; }

        /* СЕНСОРНОЕ УПРАВЛЕНИЕ */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: transparent;
            border: 1px solid var(--neon);
            border-radius: 50%;
            color: var(--neon);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            background: var(--neon);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon);
        }

        .btn-center { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        @media (max-width: 700px) {
            .scripa-header-fixed { position: relative; top: 0; left: 0; margin-bottom: 10px; padding: 10px; }
            .main-logo-img { width: 160px; }
            .header-content { margin-top: 10px; }
            .game-title { font-size: 1.2rem; }
            .main-container { flex-direction: column; align-items: center; gap: 10px; padding: 10px; }
            .info-side { flex-direction: row; width: 100%; justify-content: center; }
            .info-box { min-width: 80px; }
            .mobile-controls { display: grid; }
            canvas#tetris { width: 180px; height: 360px; }
        }
    </style>
</head>
<body>

    <div class="scripa-header-fixed">
        <a href="../index.html" class="logo-link">
            <img src="../assets/logo_games.png" alt="SCRIPA GAMES" class="main-logo-img">
        </a>
    </div>

    <div class="header-content">
        <a href="../index.html" class="back-btn">← в меню</a>
        <h1 class="game-title">КОСМИЧЕСКИЙ ТЕТРИС</h1>
    </div>

    <div class="main-container">
        <div class="game-side" id="game-touch-zone">
            <canvas id="tetris" width="240" height="480"></canvas>
            <div id="pause-overlay">
                <h2 style="color:var(--neon)">ПАУЗА</h2>
                <button onclick="togglePause()" style="background:transparent; border:1px solid var(--neon); color:var(--neon); padding:10px;">ПРОДОЛЖИТЬ</button>
            </div>
        </div>

        <div class="info-side">
            <div class="info-box">
                <span class="label">СЛЕДУЮЩАЯ</span>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <div class="info-box">
                <span class="label">СЧЕТ</span>
                <div id="score" class="value">0</div>
            </div>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="ctrl-btn btn-center" id="btn-rotate">↻</div>
        <div class="ctrl-btn btn-left" id="btn-left">◀</div>
        <div class="ctrl-btn btn-down" id="btn-down">▼</div>
        <div class="ctrl-btn btn-right" id="btn-right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const pauseOverlay = document.getElementById('pause-overlay');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        const colors = [null, '#66fcf1', '#45a29e', '#00e676', '#ff1744', '#ff9100', '#ffea00', '#2979ff'];

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);

            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (player.next) drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function arenaSweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += 10;
            }
            document.getElementById('score').innerText = player.score;
        }

        function playerDrop() {
            if (paused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (paused) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerRotate(dir) {
            if (paused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                document.getElementById('score').innerText = 0;
            }
        }

        let paused = false;
        function togglePause() {
            paused = !paused;
            pauseOverlay.style.display = paused ? 'flex' : 'none';
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            if (!paused) {
                const deltaTime = time - lastTime;
                lastTime = time;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
                draw();
            } else {
                lastTime = time;
            }
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 24);
        const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };

        // УПРАВЛЕНИЕ КЛАВИАТУРОЙ
        document.addEventListener('keydown', event => {
            if ([32, 37, 38, 39, 40].indexOf(event.keyCode) > -1) event.preventDefault();
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
            else if (event.keyCode === 80 || event.keyCode === 27) togglePause();
        });

        // СЕНСОРНОЕ УПРАВЛЕНИЕ
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(-1); });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(1); });
        document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); playerDrop(); });
        document.getElementById('btn-rotate').addEventListener('touchstart', (e) => { e.preventDefault(); playerRotate(1); });
        
        // Пауза по клику на игровое поле (для мобилок)
        document.getElementById('game-touch-zone').addEventListener('click', () => { if(window.innerWidth < 700) togglePause(); });

        playerReset();
        update();
    </script>
</body>
</html>
