<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRIPA: NEON TETRIS</title>
    <link rel="apple-touch-icon" href="../assets/logo_games.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0b0c10">
    
    <style>
        :root { 
            --neon: #66fcf1; 
            --dark-bg: #0b0c10; 
            --accent: #45a29e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--dark-bg);
            color: var(--neon);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: none;
        }

        /* [cite: 1] ЛОГОТИП SCRIPA */
        .scripa-header-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .main-logo-img {
            width: 240px;
            height: auto;
            transition: 0.4s;
            image-rendering: -webkit-optimize-contrast;
            display: block;
        }

        .main-logo-img:hover {
            filter: drop-shadow(0 0 25px var(--neon)) brightness(1.2);
            transform: scale(1.03);
        }

        /* КНОПКА В МЕНЮ (ОВАЛ) */
        .btn-menu {
            border: 1px solid var(--neon);
            background: transparent;
            color: var(--neon);
            border-radius: 50px;
            padding: 8px 30px;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 20px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            letter-spacing: 1px;
        }
        .btn-menu:hover { background: rgba(102, 252, 241, 0.1); box-shadow: 0 0 15px rgba(102, 252, 241, 0.2); }

        /* [cite: 4] ЗАГОЛОВОК */
        .game-title {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
            margin: 0 0 15px 0;
        }

        /* ГЕОМЕТРИЯ */
        .main-container {
            display: flex;
            gap: 25px;
            align-items: flex-start;
            max-height: 80vh; 
        }

        .game-side { 
            position: relative; 
            border: 2px solid var(--accent); 
            background: #000; 
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.15);
        }
        
        canvas#tetris { 
            display: block;
            height: 65vh; 
            width: auto;
            aspect-ratio: 1/2;
        }

        /* ИНФО-ПАНЕЛЬ */
        .info-side { 
            display: flex; 
            flex-direction: column; 
            width: 200px; 
            gap: 15px; 
        }

        .info-box { 
            background: rgba(31, 40, 51, 0.4); 
            border: 1px solid var(--accent); 
            padding: 10px; 
            border-radius: 4px; 
            text-align: center; 
        }

        .label { color: var(--accent); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        .value { font-size: 1.4rem; font-weight: bold; color: #fff; }
        canvas#next { width: 70px; height: 70px; margin: 0 auto; display: block; }

        /* КАРТОЧКА УПРАВЛЕНИЯ ПК */
        .controls-card {
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 12px;
            padding: 15px;
            background: rgba(11, 12, 16, 0.5);
        }
        .controls-card h3 { 
            font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; margin: 0 0 12px 0; text-align: center;
        }
        .keys-grid {
            display: grid;
            grid-template-areas: ". up ." "left down right";
            gap: 4px; justify-content: center; margin-bottom: 15px;
        }
        .key-btn {
            width: 32px; height: 32px; border: 1px solid var(--neon); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; color: var(--neon); font-size: 0.9rem;
        }
        .control-legend { font-size: 0.7rem; color: #c5c6c7; line-height: 1.6; }
        .control-legend b { color: var(--neon); }

        /* КНОПКА СБРОС (ОВАЛ) */
        .btn-reset {
            border: 1px solid var(--neon);
            background: transparent;
            color: var(--neon);
            border-radius: 50px;
            padding: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            width: 100%;
            letter-spacing: 1px;
        }
        .btn-reset:hover { background: rgba(102, 252, 241, 0.15); box-shadow: 0 0 10px var(--neon); }

        @media (max-width: 768px) {
            .scripa-header-fixed { display: none; }
            .game-title { font-size: 1.4rem; letter-spacing: 3px; }
            .main-container { gap: 10px; max-height: 85vh; }
            canvas#tetris { height: 60vh; }
            .info-side { width: 90px; gap: 8px; }
            .value { font-size: 0.9rem; }
            canvas#next { width: 45px; height: 45px; }
            .controls-card { display: none; }
        }

        #pause-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="scripa-header-fixed">
        <a href="../index.html">
            <img src="../assets/logo_games.png" alt="SCRIPA" class="main-logo-img">
        </a>
    </div>

    <a href="../index.html" class="btn-menu">← В МЕНЮ</a>

    <h1 class="game-title">NEON TETRIS</h1>

    <div class="main-container">
        <div class="game-side" id="game-area">
            <canvas id="tetris" width="240" height="480"></canvas>
            <div id="pause-overlay">
                <h2 style="letter-spacing: 5px;">ПАУЗА</h2>
                <button class="btn-reset" onclick="togglePause()" style="width: auto; padding: 10px 25px;">ПРОДОЛЖИТЬ</button>
            </div>
        </div>

        <div class="info-side">
            <div class="info-box">
                <span class="label">СЛЕДУЮЩАЯ</span>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            
            <div class="info-box">
                <span class="label">СЧЕТ</span>
                <div id="score" class="value">0</div>
            </div>

            <div class="controls-card">
                <h3>УПРАВЛЕНИЕ</h3>
                <div class="keys-grid">
                    <div class="key-btn" style="grid-area: up">▲</div>
                    <div class="key-btn" style="grid-area: left">◀</div>
                    <div class="key-btn" style="grid-area: down">▼</div>
                    <div class="key-btn" style="grid-area: right">▶</div>
                </div>
                <div class="control-legend">
                    ▲ — Поворот<br>
                    ▼ — Ускорить<br>
                    ◀ ▶ — Движение<br>
                    <b>P / ESC</b> — Пауза
                </div>
            </div>

            <button class="btn-reset" onclick="resetGame()">СБРОС</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        // [cite: 5] Масштаб
        context.scale(20, 20);
        nextContext.scale(20, 20);

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        const arena = Array.from({length: 24}, () => Array(12).fill(0));
        
        // ВЕРНУЛИ НЕОНОВЫЕ ЦВЕТА
        const colors = [
            null, 
            '#66fcf1', // I
            '#45a29e', // L
            '#00e676', // J
            '#ff1744', // O
            '#ff9100', // Z
            '#ffea00', // S
            '#2979ff'  // T
        ];

        const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value]; // Использование массива цветов
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.lineWidth = 0.05; ctx.strokeStyle = '#000';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);

            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (player.next) drawMatrix(player.next, {x: 1, y: 1}, nextContext);
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function playerDrop() {
            if (paused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                    });
                });
                playerReset();
                sweep();
            }
            dropCounter = 0;
        }

        function sweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                player.score += 10;
                document.getElementById('score').innerText = player.score;
                y++;
            }
        }

        function playerReset() {
            const pcs = 'ILJOTSZ';
            player.matrix = player.next || createPiece(pcs[pcs.length * Math.random() | 0]);
            player.next = createPiece(pcs[pcs.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = 5;
            if (collide(arena, player)) {
                arena.forEach(r => r.fill(0));
                player.score = 0;
                document.getElementById('score').innerText = 0;
            }
        }

        function resetGame() {
            arena.forEach(r => r.fill(0));
            player.score = 0;
            document.getElementById('score').innerText = 0;
            playerReset();
        }

        let paused = false;
        function togglePause() { 
            paused = !paused; 
            document.getElementById('pause-overlay').style.display = paused ? 'flex' : 'none';
        }

        let dropCounter = 0;
        let lastTime = 0;
        function update(time = 0) {
            if (!paused) {
                const dt = time - lastTime; lastTime = time;
                dropCounter += dt;
                if (dropCounter > 1000) playerDrop();
                draw();
            } else { lastTime = time; }
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', e => {
            if (e.keyCode === 37) player.pos.x--, collide(arena, player) && player.pos.x++;
            if (e.keyCode === 39) player.pos.x++, collide(arena, player) && player.pos.x--;
            if (e.keyCode === 40) playerDrop();
            if (e.keyCode === 38) {
                const old = player.matrix;
                player.matrix = player.matrix[0].map((_, i) => player.matrix.map(row => row[i]).reverse());
                if (collide(arena, player)) player.matrix = old;
            }
            if (e.keyCode === 80 || e.keyCode === 27) togglePause();
        });

        let tsX, tsY;
        const gameArea = document.getElementById('game-area');
        gameArea.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, {passive:false});
        gameArea.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tsX;
            const dy = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
                const old = player.matrix;
                player.matrix = player.matrix[0].map((_, i) => player.matrix.map(row => row[i]).reverse());
                if (collide(arena, player)) player.matrix = old;
            }
            else if (Math.abs(dx) > Math.abs(dy)) { dx > 35 ? (player.pos.x++, collide(arena, player) && player.pos.x--) : (player.pos.x--, collide(arena, player) && player.pos.x++); }
            else if (dy > 35) playerDrop();
        }, {passive:false});

        playerReset();
        update();
    </script>
</body>
</html>
