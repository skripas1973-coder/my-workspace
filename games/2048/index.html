<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRIPA 2048: NEON EDITION</title>
    <style>
        :root {
            --neon: #66fcf1;
            --dark: #0b0c10;
            --accent: #45a29e;
            --cell-bg: #1f2833;
        }

        body {
            background: var(--dark);
            color: var(--neon);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            /* touch-action: none убирает лишние свайпы браузера на мобилках */
            touch-action: none;
        }

        .scripa-header-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .main-logo-img {
            width: 240px; 
            height: auto;
            display: block;
            filter: drop-shadow(0 0 20px rgba(102, 252, 241, 0.5));
            transition: 0.3s;
        }

        .header-content {
            margin-top: 80px;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            text-decoration: none; color: var(--accent); border: 1px solid var(--accent);
            padding: 5px 15px; border-radius: 20px; font-size: 11px; text-transform: uppercase; transition: 0.3s;
        }
        .back-btn:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .game-title {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 15px rgba(102, 252, 241, 0.5);
            margin: 0;
        }

        .score-box { 
            font-size: 18px; 
            margin: 15px 0; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: #fff;
        }

        .game-board {
            position: relative;
            background: var(--accent);
            padding: 5px;
            border-radius: 5px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .grid-bg {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 5px;
            width: 100%;
            height: 100%;
        }

        .grid-cell { background: var(--cell-bg); border-radius: 2px; }

        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 2px;
            transition: transform 0.1s ease-in-out;
            z-index: 10;
            border: 1px solid var(--neon);
            background: var(--dark);
            box-sizing: border-box;
            color: var(--neon);
            box-shadow: inset 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .controls { margin: 30px; }
        button {
            background: transparent; color: var(--neon); border: 1px solid var(--neon);
            padding: 10px 30px; border-radius: 5px; cursor: pointer; font-size: 11px; 
            text-transform: uppercase; transition: 0.3s; font-family: inherit; outline: none;
        }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        @media (max-width: 600px) {
            .scripa-header-fixed { position: relative; top: 0; left: 0; margin-bottom: 20px; padding: 10px; }
            .main-logo-img { width: 160px; }
            .header-content { margin-top: 20px; }
            .game-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="scripa-header-fixed">
    <img src="../assets/logo_games.png" alt="SCRIPA GAMES" class="main-logo-img">
</div>

<div class="header-content">
    <a href="../index.html" class="back-btn">← в меню</a>
    <h1 class="game-title">НЕОНОВЫЙ 2048</h1>
</div>

<div class="score-box">СЧЕТ: <span id="score">0</span></div>

<div class="game-board" id="board-container">
    <div class="grid-bg">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>
</div>

<div class="controls">
    <button onclick="resetGame()">Сброс игры</button>
</div>

<script>
    const container = document.getElementById('board-container');
    const scoreEl = document.getElementById('score');
    let board = Array(16).fill(null);
    let score = 0;

    function resetGame() {
        board = Array(16).fill(null);
        score = 0;
        scoreEl.innerText = score;
        setupBoardSize();
        addTile(); addTile();
        render();
    }

    function setupBoardSize() {
        const boardWidth = Math.min(window.innerWidth - 40, 500);
        container.style.width = `${boardWidth}px`;
        container.style.height = `${boardWidth}px`;
    }

    function addTile() {
        let empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
        if (empty.length) board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
    }

    function render() {
        container.querySelectorAll('.tile').forEach(t => t.remove());
        const boardWidth = container.clientWidth;
        const cellSize = (boardWidth - 10) / 4;
        
        board.forEach((val, i) => {
            if (val !== null) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = val;
                const col = i % 4;
                const row = Math.floor(i / 4);
                const gap = 5;
                const offset = 5;
                tile.style.width = `${cellSize - gap}px`;
                tile.style.height = `${cellSize - gap}px`;
                tile.style.left = `${col * cellSize + offset}px`;
                tile.style.top = `${row * cellSize + offset}px`;
                container.appendChild(tile);
            }
        });
    }

    function slide(dir) {
        let moved = false;
        let res = [...board];
        for (let i = 0; i < 4; i++) {
            let line = [];
            for (let j = 0; j < 4; j++) {
                let idx = (dir === 'left' || dir === 'right') ? (i * 4 + j) : (j * 4 + i);
                line.push(res[idx]);
            }
            if (dir === 'right' || dir === 'down') line.reverse();
            let f = line.filter(v => v !== null);
            for (let j = 0; j < f.length - 1; j++) {
                if (f[j] === f[j+1]) { f[j] *= 2; score += f[j]; f.splice(j+1, 1); moved = true; }
            }
            while (f.length < 4) f.push(null);
            if (dir === 'right' || dir === 'down') f.reverse();
            for (let j = 0; j < 4; j++) {
                let idx = (dir === 'left' || dir === 'right') ? (i * 4 + j) : (j * 4 + i);
                if (res[idx] !== f[j]) moved = true;
                res[idx] = f[j];
            }
        }
        if (moved) { board = res; addTile(); scoreEl.innerText = score; render(); }
    }

    // ИСПРАВЛЕНО: Теперь страница не скроллится при нажатии стрелок
    window.onkeydown = e => { 
        if(e.key.includes('Arrow')) {
            e.preventDefault(); // Блокирует прокрутку страницы
            slide(e.key.replace('Arrow','').toLowerCase());
        }
    };

    let sX, sY;
    container.ontouchstart = e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; };
    container.ontouchend = e => {
        let dX = e.changedTouches[0].clientX - sX, dY = e.changedTouches[0].clientY - sY;
        if (Math.max(Math.abs(dX), Math.abs(dY)) > 30) slide(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 'right' : 'left') : (dY > 0 ? 'down' : 'up'));
    };

    window.onresize = () => { setupBoardSize(); render(); };
    resetGame();
</script>
</body>
</html>
