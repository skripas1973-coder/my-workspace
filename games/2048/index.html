<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCRIPA 2048: NEON EDITION</title>
    <style>
        :root {
            --neon: #66fcf1;
            --dark: #0b0c10;
            --accent: #45a29e;
            --cell-bg: #1f2833;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--dark);
            color: var(--neon);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100vh;
            overflow: hidden; 
            touch-action: none;
        }

        /* MATRIX BACKGROUND (STANDARDS) */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            filter: blur(1px);
        }

        /* УНИВЕРСАЛЬНАЯ ШАПКА SCRIPA */
        .scripa-header-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .main-logo-img {
            width: 240px; 
            height: auto;
            display: block;
            filter: drop-shadow(0 0 15px rgba(102, 252, 241, 0.4));
            transition: 0.3s ease-in-out;
            image-rendering: -webkit-optimize-contrast;
        }

        .main-logo-img:hover {
            filter: drop-shadow(0 0 25px rgba(102, 252, 241, 0.9));
            opacity: 0.9;
        }

        .header-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            z-index: 1;
        }

        .back-btn {
            text-decoration: none; 
            color: var(--accent); 
            border: 1px solid var(--accent);
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s ease-in-out;
            background: transparent;
        }

        .back-btn:hover {
            color: var(--neon);
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.6);
            background: rgba(102, 252, 241, 0.05);
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
            margin: 0;
        }

        .score-box { 
            font-size: 16px; 
            margin: 10px 0; 
            letter-spacing: 2px; 
            color: #fff;
            z-index: 1;
        }

        .game-board {
            position: relative;
            background: var(--accent);
            padding: 5px;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            touch-action: none;
            z-index: 1;
        }

        .grid-bg {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 5px;
            width: 100%;
            height: 100%;
        }

        .grid-cell { background: var(--cell-bg); border-radius: 2px; }

        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            border-radius: 2px;
            transition: transform 0.1s ease-in-out;
            z-index: 10;
            border: 1px solid var(--neon);
            background: rgba(11, 12, 16, 0.9);
            color: var(--neon);
            box-shadow: inset 0 0 5px rgba(102, 252, 241, 0.2);
        }

        .controls { margin-top: 20px; z-index: 1; }
        .reset-btn {
            background: transparent; 
            color: var(--neon); 
            border: 1px solid var(--neon);
            padding: 8px 25px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 10px; 
            text-transform: uppercase; 
            font-family: inherit;
            letter-spacing: 1px;
            transition: 0.3s ease-in-out;
            outline: none;
        }

        .reset-btn:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.8);
        }

        /* МОБИЛЬНАЯ ВЕРСИЯ: Убираем логотип и поднимаем всё выше */
        @media (max-width: 600px) {
            .scripa-header-fixed { display: none; } /* Логотип убран */
            .header-content { margin-top: -40px; } /* Весь контент поднят выше */
            .game-title { font-size: 1.2rem; }
            .score-box { margin: 5px 0; }
            .controls { margin-top: 15px; }
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="scripa-header-fixed">
    <a href="../index.html">
        <img src="../assets/logo_games.png" alt="SCRIPA GAMES" class="main-logo-img">
    </a>
</div>

<div class="header-content">
    <a href="../index.html" class="back-btn">← в меню</a>
    <h1 class="game-title">НЕОНОВЫЙ 2048</h1>
</div>

<div class="score-box">СЧЕТ: <span id="score">0</span></div>

<div class="game-board" id="board-container">
    <div class="grid-bg">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>
</div>

<div class="controls">
    <button class="reset-btn" onclick="resetGame()">Сброс игры</button>
</div>

<script>
    // MATRIX BACKGROUND
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgW = bgCanvas.width = window.innerWidth;
    let bgH = bgCanvas.height = window.innerHeight;
    const drops = Array(Math.floor(bgW / 20)).fill(1);

    function drawBackground() {
        bgCtx.fillStyle = 'rgba(11, 12, 16, 0.1)';
        bgCtx.fillRect(0, 0, bgW, bgH);
        bgCtx.fillStyle = '#66fcf1';
        bgCtx.font = '15px monospace';
        for (let i = 0; i < drops.length; i++) {
            const text = Math.floor(Math.random() * 10);
            bgCtx.fillText(text, i * 20, drops[i] * 20);
            if (drops[i] * 20 > bgH && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    // ENGINE
    const container = document.getElementById('board-container');
    const scoreEl = document.getElementById('score');
    let board = Array(16).fill(null);
    let score = 0;

    function setupBoardSize() {
        const availableHeight = window.innerHeight - 200; 
        const availableWidth = window.innerWidth - 40;
        const size = Math.min(availableWidth, availableHeight, 450);
        
        container.style.width = `${size}px`;
        container.style.height = `${size}px`;
    }

    function addTile() {
        let empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
        if (empty.length) board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
    }

    function render() {
        container.querySelectorAll('.tile').forEach(t => t.remove());
        const boardWidth = container.clientWidth;
        const cellSize = (boardWidth - 10) / 4; 
        
        board.forEach((val, i) => {
            if (val !== null) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = val;
                const col = i % 4;
                const row = Math.floor(i / 4);
                
                tile.style.width = `${cellSize - 5}px`;
                tile.style.height = `${cellSize - 5}px`;
                tile.style.left = `${col * cellSize + 5}px`;
                tile.style.top = `${row * cellSize + 5}px`;
                container.appendChild(tile);
            }
        });
    }

    function slide(dir) {
        let moved = false;
        let res = [...board];
        for (let i = 0; i < 4; i++) {
            let line = [];
            for (let j = 0; j < 4; j++) {
                let idx = (dir === 'left' || dir === 'right') ? (i * 4 + j) : (j * 4 + i);
                line.push(res[idx]);
            }
            if (dir === 'right' || dir === 'down') line.reverse();
            let f = line.filter(v => v !== null);
            for (let j = 0; j < f.length - 1; j++) {
                if (f[j] === f[j+1]) { f[j] *= 2; score += f[j]; f.splice(j+1, 1); moved = true; }
            }
            while (f.length < 4) f.push(null);
            if (dir === 'right' || dir === 'down') f.reverse();
            for (let j = 0; j < 4; j++) {
                let idx = (dir === 'left' || dir === 'right') ? (i * 4 + j) : (j * 4 + i);
                if (res[idx] !== f[j]) moved = true;
                res[idx] = f[j];
            }
        }
        if (moved) { board = res; addTile(); scoreEl.innerText = score; render(); }
    }

    window.onkeydown = e => { if(e.key.includes('Arrow')) slide(e.key.replace('Arrow','').toLowerCase()); };
    
    let sX, sY;
    container.addEventListener('touchstart', e => { 
        sX = e.touches[0].clientX; 
        sY = e.touches[0].clientY; 
    }, {passive: false});

    container.addEventListener('touchmove', e => { e.preventDefault(); }, {passive: false});

    container.addEventListener('touchend', e => {
        let dX = e.changedTouches[0].clientX - sX, dY = e.changedTouches[0].clientY - sY;
        if (Math.max(Math.abs(dX), Math.abs(dY)) > 30) {
            slide(Math.abs(dX) > Math.abs(dY) ? (dX > 0 ? 'right' : 'left') : (dY > 0 ? 'down' : 'up'));
        }
    }, {passive: false});

    function resetGame() {
        board = Array(16).fill(null);
        score = 0;
        scoreEl.innerText = score;
        setupBoardSize();
        addTile(); addTile();
        render();
    }

    function animate() {
        drawBackground();
        requestAnimationFrame(animate);
    }

    window.onresize = () => { 
        bgW = bgCanvas.width = window.innerWidth; 
        bgH = bgCanvas.height = window.innerHeight; 
        setupBoardSize(); 
        render(); 
    };

    resetGame();
    animate();
</script>
</body>
</html>
