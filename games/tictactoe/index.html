<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СКРИПА РЯДОМ: TIC-TAC-TOE</title>
    <style>
        :root { 
            --neon: #66fcf1; 
            --dark-bg: #0b0c10; 
            --cell-bg: #1f2833; 
            --accent: #45a29e;
            --x-color: #66fcf1;
            --o-color: #ff4422;
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--dark-bg); 
            color: var(--neon); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; /* Центрируем, чтобы окно не проваливалось */
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            touch-action: manipulation;
        }

        /* MATRIX BACKGROUND */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            filter: blur(1px);
        }

        /* УНИВЕРСАЛЬНАЯ ШАПКА SCRIPA */
        .scripa-header-fixed {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .main-logo-img {
            width: 240px; 
            height: auto;
            display: block;
            filter: drop-shadow(0 0 15px rgba(102, 252, 241, 0.4));
            transition: 0.3s;
            image-rendering: -webkit-optimize-contrast;
        }
        .main-logo-img:hover { filter: drop-shadow(0 0 25px var(--neon)); opacity: 0.9; }

        .header-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            z-index: 1;
        }

        .back-btn {
            text-decoration: none; color: var(--accent); border: 1px solid var(--accent);
            padding: 4px 12px; border-radius: 20px; font-size: 10px; text-transform: uppercase; transition: 0.3s;
        }
        .back-btn:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .game-title {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
            margin: 0;
        }

        .status { font-weight: bold; letter-spacing: 1px; color: #fff; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 10px; z-index: 1; }

        /* ИГРОВОЕ ПОЛЕ */
        .board { 
            display: grid;
            gap: 5px;
            background: var(--accent);
            padding: 5px;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 1;
        }

        .cell { 
            background: var(--cell-bg);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s;
        }
        .cell:hover { background: #2a3541; }
        .cell.taken { cursor: default; }

        .symbol { width: 70%; height: 70%; pointer-events: none; }
        
        .controls { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; z-index: 1; }
        
        button, select {
            background: transparent; color: var(--neon); border: 1px solid var(--neon);
            padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 10px; 
            text-transform: uppercase; transition: 0.3s; font-family: inherit; outline: none;
        }
        button:hover, select:hover { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        select option { background: var(--dark-bg); color: var(--neon); }
        
        @media (max-width: 600px) {
            .scripa-header-fixed { display: none; } /* Убираем логотип на мобильных */
            .game-title { font-size: 1.4rem; }
            .header-content { margin-top: -20px; } /* Поднимаем выше на мобильных */
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="scripa-header-fixed">
    <a href="../index.html">
        <img src="../assets/logo_games.png" alt="SCRIPA GAMES" class="main-logo-img">
    </a>
</div>

<div class="header-content">
    <a href="../index.html" class="back-btn">← в меню</a>
    <h1 class="game-title">НЕОНОВЫЙ X-O</h1>
</div>

<div class="status" id="status">ВАШ ХОД</div>

<div id="board" class="board"></div>

<div class="controls">
    <select id="size-select" onchange="resetGame()">
        <option value="3">3x3</option>
        <option value="5">5x5</option>
        <option value="10">10x10</option>
    </select>
    <select id="mode-select" onchange="resetGame()">
        <option value="ai">ИИ</option>
        <option value="pvp">ДВОЕ</option>
    </select>
    <select id="diff-select">
        <option value="ultra" selected>УЛЬТРА</option>
        <option value="easy">ЛЕГКО</option>
    </select>
    <button onclick="resetGame()">Сброс</button>
</div>

<script>
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgW = bgCanvas.width = window.innerWidth;
    let bgH = bgCanvas.height = window.innerHeight;
    const drops = Array(Math.floor(bgW / 20)).fill(1);

    function drawBackground() {
        bgCtx.fillStyle = 'rgba(11, 12, 16, 0.1)';
        bgCtx.fillRect(0, 0, bgW, bgH);
        bgCtx.fillStyle = '#66fcf1';
        bgCtx.font = '15px monospace';
        for (let i = 0; i < drops.length; i++) {
            const text = Math.floor(Math.random() * 10);
            bgCtx.fillText(text, i * 20, drops[i] * 20);
            if (drops[i] * 20 > bgH && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    let boardState = [];
    let size = 3;
    let winNeed = 3;
    let turn = 'X';
    let active = true;

    function resetGame() {
        size = parseInt(document.getElementById('size-select').value);
        winNeed = size === 3 ? 3 : 5;
        boardState = Array(size * size).fill(null);
        turn = 'X';
        active = true;
        document.getElementById('status').innerText = "ВАШ ХОД";
        buildBoard();
    }

    function buildBoard() {
        const container = document.getElementById('board');
        const availableHeight = window.innerHeight - 250;
        const availableWidth = window.innerWidth - 40;
        const boardSize = Math.min(availableWidth, availableHeight, 450);
        const cellSize = (boardSize / size) - 5;
        
        container.style.gridTemplateColumns = `repeat(${size}, ${cellSize}px)`;
        container.style.gridTemplateRows = `repeat(${size}, ${cellSize}px)`;
        container.innerHTML = '';

        for (let i = 0; i < size * size; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            cell.onclick = () => handleMove(i);
            container.appendChild(cell);
        }
    }

    function handleMove(i) {
        if (!active || boardState[i]) return;
        makeMove(i, turn);
        if (checkWin(i)) { endGame(turn === 'X' ? "ПОБЕДА X!" : "ПОБЕДА O!"); return; }
        if (!boardState.includes(null)) { endGame("НИЧЬЯ"); return; }
        turn = turn === 'X' ? 'O' : 'X';
        document.getElementById('status').innerText = turn === 'X' ? "ХОД X" : "ХОД O";
        if (active && turn === 'O' && document.getElementById('mode-select').value === 'ai') {
            setTimeout(aiMove, 500);
        }
    }

    function makeMove(i, symbol) {
        boardState[i] = symbol;
        const cell = document.querySelector(`[data-index='${i}']`);
        cell.classList.add('taken');
        const color = symbol === 'X' ? 'var(--x-color)' : 'var(--o-color)';
        cell.innerHTML = symbol === 'X' 
            ? `<svg class="symbol" viewBox="0 0 100 100"><path d="M25 25 L75 75 M75 25 L25 75" stroke="${color}" stroke-width="12" stroke-linecap="round"/></svg>`
            : `<svg class="symbol" viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" stroke="${color}" stroke-width="12" fill="none"/></svg>`;
    }

    function aiMove() {
        const diff = document.getElementById('diff-select').value;
        let index;
        if (diff === 'easy') {
            let empty = boardState.map((v, i) => v === null ? i : null).filter(v => v !== null);
            index = empty[Math.floor(Math.random() * empty.length)];
        } else {
            index = findBestMove('O') || findBestMove('X') || boardState.indexOf(null);
        }
        if (index !== -1) handleMove(index);
    }

    function findBestMove(sym) {
        for (let i = 0; i < boardState.length; i++) {
            if (!boardState[i]) {
                boardState[i] = sym;
                if (checkWin(i)) { boardState[i] = null; return i; }
                boardState[i] = null;
            }
        }
        return null;
    }

    function checkWin(idx) {
        const r = Math.floor(idx / size), c = idx % size, sym = boardState[idx];
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (let [dr, dc] of dirs) {
            let count = 1;
            for (let step = 1; step < winNeed; step++) {
                let nr = r + dr * step, nc = c + dc * step;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size && boardState[nr * size + nc] === sym) count++; else break;
            }
            for (let step = 1; step < winNeed; step++) {
                let nr = r - dr * step, nc = c - dc * step;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size && boardState[nr * size + nc] === sym) count++; else break;
            }
            if (count >= winNeed) return true;
        }
        return false;
    }

    function endGame(msg) { active = false; document.getElementById('status').innerText = msg; }

    function animate() { drawBackground(); requestAnimationFrame(animate); }

    window.onresize = () => {
        bgW = bgCanvas.width = window.innerWidth;
        bgH = bgCanvas.height = window.innerHeight;
        buildBoard();
    };

    resetGame();
    animate();
</script>
</body>
</html>
