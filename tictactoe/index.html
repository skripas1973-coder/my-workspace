<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СКРИПА РЯДОМ: КРЕСТИКИ-НОЛИКИ</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; --red: #ff4422; --gold: #ffd700; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        #logo { position: fixed; top: 15px; left: 15px; border: 2px solid var(--neon); padding: 5px 15px; font-weight: bold; letter-spacing: 2px; background: rgba(0,0,0,0.9); z-index: 1000; text-transform: uppercase; }
        .game-view { display: flex; flex-direction: column; align-items: center; padding-top: 70px; width: 100%; }
        .top-bar { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; background: rgba(0,255,204,0.05); padding: 10px; border: 1px solid var(--neon); border-radius: 5px; }
        .btn-ui { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 12px; cursor: pointer; font-family: inherit; text-decoration: none; font-size: 0.8rem; }
        .btn-ui:hover { background: var(--neon); color: #000; }
        #xo-board { display: grid; gap: 5px; background: rgba(0,255,204,0.1); padding: 5px; border: 1px solid var(--neon); }
        .xo-cell { background: var(--bg); border: 1px solid rgba(0,255,204,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .xo-cell:hover { background: rgba(0,255,204,0.1); }
        .status-msg { margin: 10px; font-weight: bold; text-transform: uppercase; color: var(--gold); height: 20px; }
        select { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 5px; font-family: inherit; }
    </style>
</head>
<body>

<div id="logo">СКРИПА РЯДОМ</div>

<div class="game-view">
    <div class="top-bar">
        <a href="../index.html" class="btn-ui">← В МЕНЮ</a>
        <select id="xo-size-select" onchange="initXO()">
            <option value="3">3x3 (ЛЕГКО)</option>
            <option value="5">5x5 (СРЕДНЕ)</option>
            <option value="10">10x10 (СЛОЖНО)</option>
        </select>
        <button class="btn-ui" onclick="initXO()">СБРОС</button>
    </div>
    <div class="status-msg" id="xo-status">ТВОЙ ХОД</div>
    <div id="xo-board"></div>
</div>

<script>
    let xoCells = [];
    let xoActive = true;
    let xoSize = 3;
    let toWin = 3;

    function initXO() {
        xoSize = parseInt(document.getElementById('xo-size-select').value);
        toWin = xoSize === 3 ? 3 : 5;
        xoCells = Array(xoSize * xoSize).fill(null);
        xoActive = true;
        const b = document.getElementById('xo-board');
        const cellSize = xoSize === 3 ? 100 : (xoSize === 5 ? 60 : 35);
        b.style.gridTemplateColumns = `repeat(${xoSize}, ${cellSize}px)`;
        b.style.gridTemplateRows = `repeat(${xoSize}, ${cellSize}px)`;
        document.getElementById('xo-status').innerText = `НУЖНО ${toWin} В РЯД!`;
        renderXO();
    }

    function renderXO() {
        const b = document.getElementById('xo-board'); b.innerHTML = '';
        const cellSize = xoSize === 3 ? 100 : (xoSize === 5 ? 60 : 35);
        xoCells.forEach((v, i) => {
            const c = document.createElement('div');
            c.className = 'xo-cell';
            c.style.fontSize = xoSize === 3 ? '3rem' : (xoSize === 5 ? '1.8rem' : '1.1rem');
            c.style.width = cellSize + 'px'; c.style.height = cellSize + 'px';
            c.innerText = v || '';
            if(v==='X') c.style.color = '#00aaff'; if(v==='O') c.style.color = '#ff4422';
            c.onclick = () => clickXO(i); b.appendChild(c);
        });
    }

    function clickXO(i) {
        if(!xoActive || xoCells[i]) return;
        xoCells[i] = 'X'; renderXO();
        if(checkXO('X')) { finishXO("ТЫ ПОБЕДИЛ!"); return; }
        if(xoCells.every(v=>v)) { finishXO("НИЧЬЯ!"); return; }
        xoActive = false; setTimeout(aiXO, 500);
    }

    function aiXO() {
        let move = findXOwin('O') || findXOwin('X') || strategicXO();
        if(move === undefined) return;
        xoCells[move] = 'O'; renderXO();
        if(checkXO('O')) finishXO("ИИ ПОБЕДИЛ!");
        else if(xoCells.every(v=>v)) finishXO("НИЧЬЯ!");
        else xoActive = true;
    }

    function findXOwin(p) {
        for(let i=0; i<xoCells.length; i++){
            if(!xoCells[i]) {
                xoCells[i] = p;
                if(checkXO(p)) { xoCells[i] = null; return i; }
                xoCells[i] = null;
            }
        } return null;
    }

    function strategicXO() {
        if(!xoCells[Math.floor(xoCells.length/2)]) return Math.floor(xoCells.length/2);
        let empty = xoCells.map((v,i)=>v===null?i:null).filter(v=>v!==null);
        return empty[Math.floor(Math.random()*empty.length)];
    }

    function checkXO(p) {
        for(let i=0; i<xoCells.length; i++) {
            if(xoCells[i] === p) {
                if(checkDir(i, 1, 0, p) || checkDir(i, 0, 1, p) || checkDir(i, 1, 1, p) || checkDir(i, 1, -1, p)) return true;
            }
        } return false;
    }

    function checkDir(idx, dx, dy, p) {
        let count = 0;
        let r = Math.floor(idx / xoSize);
        let c = idx % xoSize;
        for(let i=0; i<toWin; i++) {
            let nr = r + i*dy, nc = c + i*dx;
            if(nr>=0 && nr<xoSize && nc>=0 && nc<xoSize && xoCells[nr*xoSize+nc] === p) count++;
            else break;
        }
        return count === toWin;
    }

    function finishXO(m) { document.getElementById('xo-status').innerText = m; xoActive = false; }
    initXO();
</script>
</body>
</html>
