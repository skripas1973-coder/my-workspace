<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СКРИПА РЯДОМ — Игровой Хаб</title>
    <style>
        :root {
            --neon: #66fcf1;
            --dark: #0b0c10;
            --accent: #45a29e;
            --gray: #1f2833;
            --text: #c5c6c7;
        }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        /* Шапка с твоим логотипом */
        .header {
            margin: 50px 0;
            text-align: center;
        }

        .logo-svg {
            width: 90px;
            height: 90px;
            filter: drop-shadow(0 0 15px var(--neon));
            margin-bottom: 15px;
        }

        h1 {
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 2.8rem;
            margin: 0;
            color: var(--neon);
            text-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
        }

        .subtitle {
            color: var(--accent);
            font-size: 1rem;
            letter-spacing: 3px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Сетка игр */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1100px;
            width: 90%;
            padding-bottom: 50px;
        }

        .game-card {
            background: var(--gray);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease forwards;
        }

        .game-card:hover {
            border-color: var(--neon);
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
            background: rgba(31, 40, 51, 0.8);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--neon);
        }

        .game-desc {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.5;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: var(--accent);
            font-size: 0.85rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M25 65Q25 35 50 35M75 65Q75 35 50 35" stroke="#66fcf1" stroke-width="5" stroke-linecap="round"/>
            <circle cx="50" cy="40" r="4" fill="#66fcf1"></circle>
            <path d="M35 75L50 55L65 75" stroke="#45a29e" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <h1>СКРИПА РЯДОМ</h1>
        <div class="subtitle">Игровой портал</div>
    </div>

    <div class="game-grid">
        <a href="tetris/index.html" class="game-card">
            <span class="icon">🧱</span>
            <div class="game-title">TETRIS</div>
            <div class="game-desc">Космическая классика. Собирай линии под неоновым светом.</div>
        </a>

        <a href="chess/index.html" class="game-card">
            <span class="icon">♞</span>
            <div class="game-title">CHESS</div>
            <div class="game-desc">Интеллектуальная битва с ИИ. Полные правила.</div>
        </a>

        <a href="shashki/index.html" class="game-card">
            <span class="icon">⚪</span>
            <div class="game-title">CHECKERS</div>
            <div class="game-desc">Динамичная стратегия. Прорывайся в дамки!</div>
        </a>

        <a href="tictactoe/index.html" class="game-card">
            <span class="icon">❌</span>
            <div class="game-title">TIC-TAC-TOE</div>
            <div class="game-desc">Быстрый поединок против умного алгоритма.</div>
        </a>
    </div>

    <footer>
        &copy; 2026 СКРИПА РЯДОМ. Все игры готовы.
    </footer>

</body>
</html>
